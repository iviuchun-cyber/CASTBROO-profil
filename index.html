<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:#000000;font-family:'Syne',sans-serif;overflow-x:hidden;}

#cosmos{position:fixed;inset:0;z-index:0;width:100vw!important;height:100vh!important;}
#planets-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;width:100vw!important;height:100vh!important;}

.wrapper{position:relative;z-index:3;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 20px 70px;}

/* CARD */
.card{width:100%;max-width:440px;border-radius:36px;padding:40px 32px 36px;position:relative;overflow:hidden;
  animation:cardIn 1s cubic-bezier(0.16,1,0.3,1) both;
  background:linear-gradient(160deg,rgba(255,255,255,0.055) 0%,rgba(255,255,255,0.018) 50%,rgba(255,255,255,0.035) 100%);
  border:1px solid rgba(255,255,255,0.11);
  backdrop-filter:blur(48px) saturate(160%);
  -webkit-backdrop-filter:blur(48px) saturate(160%);
  box-shadow:0 0 0 1px rgba(255,255,255,0.05) inset,0 2px 0 rgba(255,255,255,0.18) inset,0 32px 100px rgba(0,0,0,0.75),0 0 80px rgba(60,0,140,0.1);}
@keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.55),transparent);}
.card::after{content:'';position:absolute;inset:0;border-radius:36px;background:linear-gradient(150deg,rgba(255,255,255,0.06) 0%,transparent 35%);pointer-events:none;}

/* AVATAR */
.avatar-wrap{display:flex;justify-content:center;margin-bottom:22px;animation:fadeUp 0.9s 0.15s cubic-bezier(0.16,1,0.3,1) both;}
.avatar-ring{width:104px;height:104px;border-radius:50%;padding:3px;background:conic-gradient(from 0deg,#3a0070,#001850,#3a0070,#001850,#3a0070);animation:spinring 8s linear infinite,ringpulse 4s ease-in-out infinite;box-shadow:0 0 30px rgba(80,0,180,0.45),0 0 60px rgba(0,20,100,0.25);}
@keyframes spinring{to{filter:hue-rotate(360deg);}}
@keyframes ringpulse{0%,100%{box-shadow:0 0 30px rgba(80,0,180,0.45),0 0 60px rgba(0,20,100,0.25);}50%{box-shadow:0 0 50px rgba(100,0,240,0.65),0 0 90px rgba(0,30,140,0.4);}}
.avatar-in{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.14),transparent 55%),linear-gradient(135deg,#06001a,#00061e);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:2px;color:rgba(255,255,255,0.9);border:1px solid rgba(255,255,255,0.09);position:relative;overflow:hidden;}
.avatar-in::after{content:'';position:absolute;top:6%;left:18%;right:52%;height:28%;background:rgba(255,255,255,0.14);border-radius:50%;transform:rotate(-20deg);filter:blur(4px);}

.username{font-family:'Bebas Neue',cursive;font-size:56px;letter-spacing:7px;color:#fff;text-align:center;line-height:1;margin-bottom:5px;text-shadow:0 0 25px rgba(120,60,255,0.6),0 0 70px rgba(60,100,255,0.25);animation:fadeUp 0.9s 0.22s cubic-bezier(0.16,1,0.3,1) both;}
.handle{font-size:11px;color:rgba(255,255,255,0.28);letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:28px;animation:fadeUp 0.9s 0.28s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

.stats{display:flex;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);background:rgba(0,0,0,0.45);margin-bottom:26px;animation:fadeUp 0.9s 0.35s cubic-bezier(0.16,1,0.3,1) both;}
.stat{flex:1;padding:15px 6px;text-align:center;}
.stat+.stat{border-left:1px solid rgba(255,255,255,0.06);}
.stat-n{font-family:'Bebas Neue',cursive;font-size:22px;color:rgba(255,255,255,0.8);letter-spacing:1px;}
.stat-l{font-size:9px;letter-spacing:2.5px;color:rgba(255,255,255,0.22);text-transform:uppercase;margin-top:3px;}

.bio{text-align:center;font-size:13px;color:rgba(255,255,255,0.35);line-height:1.85;margin-bottom:26px;padding:0 8px;animation:fadeUp 0.9s 0.4s cubic-bezier(0.16,1,0.3,1) both;}
.bio b{color:rgba(255,255,255,0.72);font-weight:700;}

.hlights{display:flex;justify-content:center;gap:18px;margin-bottom:30px;animation:fadeUp 0.9s 0.46s cubic-bezier(0.16,1,0.3,1) both;}
.hl{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.hl-ring{width:56px;height:56px;border-radius:50%;padding:2px;background:conic-gradient(from 90deg,#2a0050,#00103a,#2a0050,#00103a,#2a0050);transition:transform 0.3s,box-shadow 0.3s;}
.hl:hover .hl-ring{transform:scale(1.12) translateY(-3px);box-shadow:0 0 22px rgba(100,0,220,0.55);}
.hl-in{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.1),transparent 55%),linear-gradient(135deg,#04000e,#000410);border:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:18px;}
.hl-lbl{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.28);text-transform:uppercase;}

/* MUSIC */
.music-wrap{animation:fadeUp 0.9s 0.5s cubic-bezier(0.16,1,0.3,1) both;margin-bottom:18px;}
.music-glass{border-radius:20px;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.09);backdrop-filter:blur(20px);padding:16px 18px;position:relative;overflow:hidden;box-shadow:0 1px 0 rgba(255,255,255,0.1) inset;}
.music-glass::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);}
.music-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.music-icon{width:42px;height:42px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#1a0040,#000820);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;overflow:hidden;}
.music-icon::after{content:'';position:absolute;top:4px;left:6px;right:50%;height:30%;background:rgba(255,255,255,0.12);border-radius:50%;transform:rotate(-15deg);filter:blur(2px);}
.music-info{flex:1;min-width:0;}
.music-title{font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;color:rgba(255,255,255,0.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.music-artist{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:2px;}
.play-btn{width:36px;height:36px;border-radius:50%;flex-shrink:0;cursor:pointer;background:linear-gradient(135deg,rgba(80,0,180,0.7),rgba(0,30,100,0.7));border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 0 14px rgba(80,0,180,0.4);color:#fff;font-size:12px;}
.play-btn:hover{transform:scale(1.1);box-shadow:0 0 24px rgba(100,0,255,0.6);}
.waveform{display:flex;align-items:center;gap:2.5px;height:28px;justify-content:center;}
.bar{width:3px;border-radius:2px;background:rgba(255,255,255,0.12);}

#yt-frame{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;}

.cta{display:block;width:100%;padding:17px;border-radius:18px;text-align:center;text-decoration:none;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:4px;color:rgba(255,255,255,0.92);position:relative;overflow:hidden;cursor:pointer;transition:transform 0.25s,box-shadow 0.25s;
  background:linear-gradient(135deg,rgba(40,0,90,0.9),rgba(0,15,70,0.9),rgba(40,0,90,0.9));background-size:300% 300%;
  animation:fadeUp 0.9s 0.58s cubic-bezier(0.16,1,0.3,1) both,btngrad 6s ease infinite 1s;
  border:1px solid rgba(255,255,255,0.14);box-shadow:0 2px 0 rgba(255,255,255,0.15) inset,0 10px 40px rgba(0,0,0,0.6),0 0 30px rgba(50,0,120,0.3);backdrop-filter:blur(10px);}
.cta::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);}
.cta::after{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);animation:shimmer 4s infinite;}
@keyframes shimmer{0%{left:-100%;}100%{left:200%;}}
@keyframes btngrad{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.cta:hover{transform:translateY(-3px);}

.footer{margin-top:32px;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.07);border-radius:50px;padding:10px 22px;backdrop-filter:blur(20px);animation:fadeUp 1s 0.7s cubic-bezier(0.16,1,0.3,1) both;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#5500cc;box-shadow:0 0 8px #5500cc;animation:livep 2.5s ease-in-out infinite;}
@keyframes livep{0%,100%{opacity:1;}50%{opacity:0.3;}}
.footer-txt{font-size:10px;letter-spacing:2.5px;color:rgba(255,255,255,0.28);text-transform:uppercase;}

/* ENTER OVERLAY */
#enter-overlay{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);cursor:pointer;transition:opacity 0.8s ease;}
#enter-overlay.hidden{opacity:0;pointer-events:none;}
.enter-pulse{width:80px;height:80px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px;animation:epulse 2s ease-in-out infinite;box-shadow:0 0 30px rgba(100,0,255,0.4);}
@keyframes epulse{0%,100%{transform:scale(1);box-shadow:0 0 30px rgba(100,0,255,0.4);}50%{transform:scale(1.1);box-shadow:0 0 50px rgba(100,0,255,0.7);}}
.enter-txt{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:6px;color:rgba(255,255,255,0.7);}
.enter-sub{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.3);margin-top:8px;text-transform:uppercase;}

/* ===== MOBILE RESPONSIVE ===== */
@media(max-width:480px){
  .wrapper{padding:24px 12px 50px;}
  .card{border-radius:24px;padding:28px 18px 24px;}
  .username{font-size:38px;letter-spacing:4px;}
  .handle{font-size:10px;letter-spacing:2px;margin-bottom:20px;}
  .avatar-ring{width:88px;height:88px;}
  .stat-n{font-size:18px;}
  .stat-l{font-size:8px;letter-spacing:2px;}
  .stat{padding:12px 4px;}
  .bio{font-size:12px;margin-bottom:20px;}
  .hlights{gap:12px;margin-bottom:22px;}
  .hl-ring{width:48px;height:48px;}
  .hl-lbl{font-size:8px;}
  .music-glass{padding:12px 14px;}
  .music-icon{width:36px;height:36px;}
  .music-title{font-size:13px;}
  .cta{font-size:15px;letter-spacing:3px;padding:14px;}
  .footer{padding:8px 16px;}
  .footer-txt{font-size:9px;letter-spacing:2px;}
  .waveform{height:22px;}
}

@media(max-width:360px){
  .username{font-size:32px;letter-spacing:3px;}
  .card{padding:22px 14px 20px;}
  .hlights{gap:8px;}
  .hl-ring{width:42px;height:42px;}
  .hl-in{font-size:15px;}
}
</style>
</head>

let orbits;

function setupPlanets() {
  sunX = W * 0.08;
  sunY = H * 0.12;
  sunR = Math.min(W, H) * 0.045;

  // spread orbits across screen
  const maxOrbit = Math.max(W, H) * 1.1;
  orbits = [0.09, 0.16, 0.24, 0.33, 0.48, 0.64, 0.80, 0.98].map(f => maxOrbit * f);

  planets.forEach((p, i) => {
    p.dist = orbits[i];
    p.speed = speeds[i];
    p.angle = Math.random() * Math.PI * 2;
  });
}

function drawSun() {
  // corona rings
  for (let i = 3; i >= 1; i--) {
    const grad = px.createRadialGradient(sunX, sunY, sunR * 0.5, sunX, sunY, sunR * (1 + i * 0.8));
    grad.addColorStop(0, `rgba(255,200,50,${0.06 / i})`);
    grad.addColorStop(1, 'rgba(255,100,0,0)');
    px.beginPath();
    px.arc(sunX, sunY, sunR * (1 + i * 0.8), 0, Math.PI * 2);
    px.fillStyle = grad;
    px.fill();
  }
  // sun body
  const sg = px.createRadialGradient(sunX - sunR*0.2, sunY - sunR*0.2, 0, sunX, sunY, sunR);
  sg.addColorStop(0, '#fff7aa');
  sg.addColorStop(0.3, '#ffdd44');
  sg.addColorStop(0.7, '#ff9900');
  sg.addColorStop(1, '#cc4400');
  px.beginPath();
  px.arc(sunX, sunY, sunR, 0, Math.PI * 2);
  px.fillStyle = sg;
  px.fill();
}

function drawOrbitLine(dist) {
  px.beginPath();
  px.arc(sunX, sunY, dist, 0, Math.PI * 2);
  px.strokeStyle = 'rgba(255,255,255,0.04)';
  px.lineWidth = 0.5;
  px.stroke();
}

function drawPlanet(p, t) {
  p.angle += p.speed;
  const x = sunX + Math.cos(p.angle) * p.dist;
  const y = sunY + Math.sin(p.angle) * p.dist;
  p.cx = x; p.cy = y;

  // glow
  const grd = px.createRadialGradient(x, y, 0, x, y, p.r * 3);
  grd.addColorStop(0, p.glow);
  grd.addColorStop(1, 'transparent');
  px.beginPath();
  px.arc(x, y, p.r * 3, 0, Math.PI * 2);
  px.fillStyle = grd;
  px.fill();

  // Saturn rings (behind)
  if (p.rings) {
    px.save();
    px.translate(x, y);
    px.scale(1, 0.32);
    px.beginPath();
    px.arc(0, 0, p.r * 2.2, 0, Math.PI * 2);
    px.strokeStyle = 'rgba(220,200,140,0.45)';
    px.lineWidth = p.r * 0.55;
    px.stroke();
    px.beginPath();
    px.arc(0, 0, p.r * 2.7, 0, Math.PI * 2);
    px.strokeStyle = 'rgba(200,180,110,0.25)';
    px.lineWidth = p.r * 0.3;
    px.stroke();
    px.restore();
  }

  // planet body
  const pg = px.createRadialGradient(x - p.r*0.3, y - p.r*0.3, p.r*0.05, x, y, p.r);

  if (p.name === 'Earth') {
    pg.addColorStop(0, '#4db8e8');
    pg.addColorStop(0.4, '#1a6bb5');
    pg.addColorStop(0.7, '#2d8a3e');
    pg.addColorStop(1, '#0d3d6e');
  } else if (p.name === 'Mars') {
    pg.addColorStop(0, '#e0704a');
    pg.addColorStop(0.4, '#c1440e');
    pg.addColorStop(0.8, '#8b2500');
    pg.addColorStop(1, '#5a1500');
  } else if (p.name === 'Jupiter') {
    pg.addColorStop(0, '#f0d090');
    pg.addColorStop(0.4, '#c88b3a');
    pg.addColorStop(0.7, '#b07020');
    pg.addColorStop(1, '#7a4a10');
  } else if (p.name === 'Saturn') {
    pg.addColorStop(0, '#f8f0c0');
    pg.addColorStop(0.5, '#e4d191');
    pg.addColorStop(1, '#a08040');
  } else if (p.name === 'Uranus') {
    pg.addColorStop(0, '#c0f8f8');
    pg.addColorStop(0.5, '#7de8e8');
    pg.addColorStop(1, '#2ab0b0');
  } else if (p.name === 'Neptune') {
    pg.addColorStop(0, '#6090ff');
    pg.addColorStop(0.5, '#2250d8');
    pg.addColorStop(1, '#0820a0');
  } else if (p.name === 'Venus') {
    pg.addColorStop(0, '#f5dfa0');
    pg.addColorStop(0.5, '#e8c46a');
    pg.addColorStop(1, '#9a6010');
  } else {
    pg.addColorStop(0, '#d0d0d0');
    pg.addColorStop(0.5, '#b0b0b0');
    pg.addColorStop(1, '#606060');
  }

  px.beginPath();
  px.arc(x, y, p.r, 0, Math.PI * 2);
  px.fillStyle = pg;
  px.fill();

  // Jupiter bands
  if (p.bands) {
    for (let b = 0; b < 4; b++) {
      const by = y - p.r + (p.r * 2 / 5) * b + p.r * 0.2;
      px.save();
      px.beginPath();
      px.arc(x, y, p.r, 0, Math.PI*2);
      px.clip();
      px.fillStyle = b%2===0 ? 'rgba(160,100,20,0.2)' : 'rgba(240,200,100,0.15)';
      px.fillRect(x - p.r, by, p.r*2, p.r*0.35);
      px.restore();
    }
  }

  // atmosphere shimmer (Earth)
  if (p.hasAtmo) {
    px.beginPath();
    px.arc(x, y, p.r + 2, 0, Math.PI * 2);
    px.strokeStyle = 'rgba(100,200,255,0.25)';
    px.lineWidth = 2;
    px.stroke();
  }

  // highlight
  px.beginPath();
  px.arc(x - p.r*0.3, y - p.r*0.3, p.r*0.35, 0, Math.PI*2);
  px.fillStyle = 'rgba(255,255,255,0.18)';
  px.fill();

  // label
  if (p.r >= 9 && x > 0 && x < W && y > 0 && y < H) {
    px.fillStyle = 'rgba(255,255,255,0.25)';
    px.font = '9px Syne, sans-serif';
    px.textAlign = 'center';
    px.fillText(p.name, x, y + p.r + 12);
  }
}

let t = 0;
function drawPlanets() {
  px.clearRect(0, 0, W, H);
  t += 0.01;

  // orbit lines
  planets.forEach(p => drawOrbitLine(p.dist));
  drawSun();
  planets.forEach(p => drawPlanet(p, t));
}

/* star draw */
let meteorsArr = [];
function spawnMeteor() {
  const ang = Math.PI*(0.05+Math.random()*0.25);
  meteorsArr.push({x:Math.random()*W*0.75,y:Math.random()*H*0.35,vx:Math.cos(ang)*(8+Math.random()*10),vy:Math.sin(ang)*(4+Math.random()*6),len:90+Math.random()*120,life:1});
}

let frame2 = 0;
function drawStarsBg() {
  cx.clearRect(0,0,W,H);
  cx.fillStyle='#000003';
  cx.fillRect(0,0,W,H);
  for(const s of stars){
    s.a+=s.da;
    if(s.a>0.75){s.a=0.75;s.da*=-1;}
    if(s.a<0.05){s.a=0.05;s.da*=-1;}
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle=`hsla(${s.hue},45%,80%,${s.a})`;cx.fill();
  }
  meteorsArr=meteorsArr.filter(m=>m.life>0);
  for(const m of meteorsArr){
    m.x+=m.vx;m.y+=m.vy;m.life-=0.02;
    const ang=Math.atan2(m.vy,m.vx);
    const tx=m.x-Math.cos(ang)*m.len,ty=m.y-Math.sin(ang)*m.len;
    const g=cx.createLinearGradient(tx,ty,m.x,m.y);
    g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(1,`rgba(255,255,255,${m.life*0.8})`);
    cx.beginPath();cx.moveTo(tx,ty);cx.lineTo(m.x,m.y);
    cx.strokeStyle=g;cx.lineWidth=1;cx.stroke();
  }
  frame2++;
  if(frame2%280===0&&Math.random()>0.3)spawnMeteor();
}

function loop() {
  drawStarsBg();
  drawPlanets();
  requestAnimationFrame(loop);
}

resize(); mkStars(); setupPlanets(); loop();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    resize();
    mkStars();
    setupPlanets();
    // canvas ni qayta to'g'rilash
    cv.style.width = '100vw';
    cv.style.height = '100vh';
    pc.style.width = '100vw';
    pc.style.height = '100vh';
  }, 50);
});

/* ========== WAVEFORM ========== */
const wf = document.getElementById('waveform');
const bars = [];
for(let i=0;i<36;i++){
  const b=document.createElement('div');b.className='bar';
  const h=4+Math.sin(i*0.4)*6+Math.random()*8;
  b.style.height=h+'px';wf.appendChild(b);bars.push({el:b,base:h});
}

let playing=false,animId=null,ytPlayer=null,ytReady=false;

// Load YouTube IFrame API
var tag=document.createElement('script');
tag.src='https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player('yt-frame',{
    height:'1',width:'1',
    videoId:'0-7IHOXkiV8',
    playerVars:{autoplay:0,loop:1,playlist:'0-7IHOXkiV8',controls:0,mute:0},
    events:{onReady:function(){ytReady=true;}}
  });
}

function enterSite(){
  const overlay=document.getElementById('enter-overlay');
  overlay.classList.add('hidden');
  setTimeout(()=>{overlay.style.display='none';},900);
  if(ytReady){
    ytPlayer.playVideo();
    playing=true;
    document.getElementById('playBtn').textContent='⏸';
    startWave();
  } else {
    // Agar YT hali tayyor bo'lmasa, tayyor bo'lishi bilan boshlash
    const checkReady=setInterval(()=>{
      if(ytReady){
        clearInterval(checkReady);
        ytPlayer.playVideo();
        playing=true;
        document.getElementById('playBtn').textContent='⏸';
        startWave();
      }
    },200);
  }
}

function togglePlay(){
  playing=!playing;
  const btn=document.getElementById('playBtn');
  if(playing){
    btn.textContent='⏸';
    if(ytReady)ytPlayer.playVideo();
    startWave();
  } else {
    btn.textContent='▶';
    if(ytReady)ytPlayer.pauseVideo();
    stopWave();
  }
}
let wt=0;
function startWave(){
  wt=0;
  function step(){
    wt+=0.07;
    bars.forEach((b,i)=>{
      const wave=Math.sin(wt+i*0.35)*7+Math.sin(wt*1.7+i*0.6)*4;
      const h=Math.max(3,b.base+wave);
      b.el.style.height=h+'px';
      const intensity=Math.min(1,(h-3)/20);
      b.el.style.background=intensity>0.3?`rgba(${120+intensity*80},${40+intensity*20},255,${0.5+intensity*0.4})`:'rgba(255,255,255,0.12)';
    });
    animId=requestAnimationFrame(step);
  }
  step();
}
function stopWave(){
  if(animId)cancelAnimationFrame(animId);
  bars.forEach(b=>{b.el.style.height=b.base+'px';b.el.style.background='rgba(255,255,255,0.12)';});
}
